Summary: Science-backed cognitive training suite named after Donald Hebb.
Description: |-
  Hebbo is a premium, science-backed cognitive training application designed to
  strengthen core executive functions—such as cognitive control, working memory,
  attention, and mental flexibility—through highly polished, gamified exercises.
  
  The application is named Hebbo as a tribute to Donald O. Hebb, the pioneer
  of neuropsychology who formulated the famous postulate: "cells that fire
  together wire together."
  
  Exercises included:
  * Flanker Task: Selective attention and cognitive inhibition.
  * Task Switching: Rapid shifting between rule sets (cognitive flexibility).
  * Spatial Span: Visual-spatial working memory sequence recall.

